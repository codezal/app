# Codezal release CI - tag push (v*) or manual dispatch.
#
# Architecture:
#   macOS  -> self-hosted Mac runner: arm + intel DMG (appdmg) + updater .app.tar.gz.
#             Outputs are uploaded as GitHub artifacts; no SSH deployment.
#   Windows -> GitHub-hosted runner: NSIS setup.exe + updater signature.
#              Outputs are uploaded as GitHub artifacts; no SSH deployment.
#   publish -> self-hosted Linux runner: download artifacts, generate latest.json,
#              and copy files locally into /var/codezal-updates/. nginx serves that
#              directory at https://updates.codezal.com/.
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   Updater signing:
#   TAURI_SIGNING_PRIVATE_KEY           private key generated by `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  key password, or an empty string for no password
#   The public half is stored in tauri.conf.json > plugins.updater.pubkey.
#
#   macOS signing and notarization:
#   APPLE_SIGNING_IDENTITY  "Developer ID Application: ERHAN ERBAS (URU3Q835QP)"
#   APPLE_ID                Apple account email
#   APPLE_PASSWORD          app-specific password
#   APPLE_TEAM_ID           URU3Q835QP
#   The code-signing private key must be available on the self-hosted Mac runner.
#
# DEPLOY_* and SSH secrets are not required. The publish job copies files locally
# on the update host.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  # Base URL used in latest.json download links. No trailing slash.
  UPDATE_BASE_URL: https://updates.codezal.com
  # Host directory written by the publish job and served by nginx.
  UPDATES_DIR: /var/codezal-updates
  # Anti-spam token embedded into the desktop app for /api/report.
  # It is exposed to Vite as import.meta.env.VITE_REPORT_TOKEN and should match
  # the website REPORT_TOKEN secret. Empty value means reports are sent without a
  # token.
  VITE_REPORT_TOKEN: ${{ secrets.VITE_REPORT_TOKEN }}

jobs:
  # macOS: self-hosted Mac builds arm + intel DMG files and updater tarballs.
  macos:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm install

      - name: Add intel cross target
        run: rustup target add x86_64-apple-darwin

      # Import the p12 into a temporary signing keychain so codesign does not
      # depend on the login keychain. This also works when the runner runs as a
      # service without an interactive GUI session. The cleanup step deletes the
      # temporary keychain.
      - name: Install signing keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/codezal-signing.keychain-db"
          KCPW="$(openssl rand -base64 24)"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          security import "$P12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC" >/dev/null
          # Put the temporary keychain first while preserving existing keychains.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$P12"
          security find-identity -v -p codesigning "$KC" | grep -q "Developer ID Application" \
            || { echo "No Developer ID identity found after p12 import"; exit 1; }
          echo "Signing keychain ready"

      - name: Build arm + intel DMG (appdmg) + updater artifacts
        env:
          # make-dmg.mjs signs the .app, bundled Bun runtime, and DMG with the
          # Developer ID identity. When APPLE_ID/PASSWORD/TEAM_ID are present it
          # notarizes the DMG with notarytool --wait and staples the result.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization credentials.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri creates updater .app.tar.gz and .sig artifacts when these are set.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run build:mac:arm
          npm run build:mac:intel

      # Regression guard: fail the release if signing or notarization is skipped.
      - name: Verify Developer ID signing and notarization
        run: |
          set -e
          for T in aarch64-apple-darwin x86_64-apple-darwin; do
            APP="src-tauri/target/$T/release/bundle/macos/Codezal.app"
            echo "== $T =="
            if codesign -dvv "$APP" 2>&1 | grep -q "Signature=adhoc"; then
              echo "Ad-hoc signature found: $APP. Is APPLE_SIGNING_IDENTITY missing?"; exit 1
            fi
            codesign --verify --deep --strict "$APP"
            if ! codesign -dv --verbose=4 "$APP" 2>&1 | grep -q "Authority=Developer ID Application"; then
              echo "Developer ID signature missing: $APP"; exit 1
            fi
            # make-dmg should have stapled the notarized DMG. stapler validate
            # fails if APPLE_ID/PASSWORD/TEAM_ID are missing or notarization was
            # skipped.
            DMG=$(ls src-tauri/target/$T/release/bundle/dmg/*.dmg)
            if ! xcrun stapler validate "$DMG"; then
              echo "DMG notarization/staple missing: $DMG. Are APPLE_ID/PASSWORD/TEAM_ID missing?"; exit 1
            fi
            echo "$T: signed + notarized (stapled)"
          done

      # Rename updater tarballs per architecture. Both targets create
      # Codezal.app.tar.gz, so names must be unique before collection. Embed the
      # version in the filename to avoid stale HTTP cache signature mismatches.
      - name: Rename updater tarballs and create fragments
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p frags
          for T in aarch64-apple-darwin x86_64-apple-darwin; do
            case "$T" in
              aarch64-apple-darwin) A=aarch64; KEY=darwin-aarch64 ;;
              x86_64-apple-darwin)  A=x64;     KEY=darwin-x86_64 ;;
            esac
            B="src-tauri/target/$T/release/bundle/macos"
            NEW="$B/Codezal_${VERSION}_${A}.app.tar.gz"
            mv "$B/Codezal.app.tar.gz" "$NEW"
            mv "$B/Codezal.app.tar.gz.sig" "$NEW.sig"
            node scripts/update-fragment.mjs "$KEY" "$NEW" "$UPDATE_BASE_URL" "frags/mac-$A.json"
          done

      # Collect distribution files in one flat directory.
      - name: Collect Mac outputs
        run: |
          set -e
          mkdir -p out
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg out/
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg out/
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz out/
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz out/

      - name: Upload Mac files
        uses: actions/upload-artifact@v4
        with:
          name: mac-files
          retention-days: 2
          path: out/*

      - name: Upload Mac fragments
        uses: actions/upload-artifact@v4
        with:
          name: frag-macos
          retention-days: 2
          path: frags/*.json

      # Delete the temporary signing keychain on the self-hosted runner.
      - name: Clean signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/codezal-signing.keychain-db" 2>/dev/null || true

  # Windows: GitHub-hosted runner builds the NSIS installer and updater signature.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: npm install

      - name: Bundle PortableGit
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $gitExe = (Get-Command git.exe -ErrorAction Stop).Source
          $gitRoot = Split-Path (Split-Path $gitExe -Parent) -Parent
          $bundleRoot = Join-Path $PWD "src-tauri/resources/git"
          Get-ChildItem $bundleRoot -Force | Remove-Item -Recurse -Force
          foreach ($entry in @("cmd", "bin", "usr", "mingw64", "etc")) {
            $source = Join-Path $gitRoot $entry
            if (Test-Path $source) {
              Copy-Item $source -Destination $bundleRoot -Recurse -Force
            }
          }
          foreach ($license in @("LICENSE.txt", "COPYING")) {
            $source = Join-Path $gitRoot $license
            if (Test-Path $source) {
              Copy-Item $source -Destination $bundleRoot -Force
            }
          }
          if (-not (Test-Path (Join-Path $bundleRoot "usr/bin/bash.exe"))) {
            throw "PortableGit bundle is missing usr/bin/bash.exe"
          }
          if (-not (Test-Path (Join-Path $bundleRoot "cmd/git.exe"))) {
            throw "PortableGit bundle is missing cmd/git.exe"
          }

      - name: Build NSIS installer + updater artifacts
        env:
          # Tauri creates the updater signature next to the NSIS setup.exe when set.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --bundles nsis --target x86_64-pc-windows-msvc

      - name: Create fragment
        shell: bash
        run: |
          set -e
          mkdir -p frags
          EXE=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe)
          node scripts/update-fragment.mjs windows-x86_64 "$EXE" "$UPDATE_BASE_URL" frags/win.json

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-files
          retention-days: 2
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe

      - name: Upload Windows fragment
        uses: actions/upload-artifact@v4
        with:
          name: frag-windows
          retention-days: 2
          path: frags/*.json

  # publish: self-hosted Linux downloads artifacts, creates latest.json, and
  # copies files locally into /var/codezal-updates/. No SSH deployment.
  publish:
    needs: [macos, windows]
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
      actions: write          # delete intermediate artifacts after publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: "{mac-files,win-files}"
          path: dist
          merge-multiple: true

      - name: Download fragments
        uses: actions/download-artifact@v4
        with:
          pattern: frag-*
          path: frags
          merge-multiple: true

      - name: Create latest.json and publish updates
        env:
          # Release notes shown by the updater UI.
          RELEASE_NOTES: Codezal ${{ github.ref_name }}
        run: |
          set -e
          node scripts/update-manifest.mjs frags latest.json
          mkdir -p "$UPDATES_DIR"
          # 1) Copy installers first because latest.json references them.
          cp dist/* "$UPDATES_DIR"/
          # 2) Copy latest.json last so clients never see a manifest that points
          # to missing files.
          cp latest.json "$UPDATES_DIR"/latest.json
          # Ensure nginx can read files even when it runs as a different user.
          chmod 644 "$UPDATES_DIR"/* 2>/dev/null || true
          echo "== $UPDATES_DIR =="
          ls -la "$UPDATES_DIR"

      - name: Verify published updater manifest
        run: |
          set -e
          npm run release:verify -- \
            --manifest "$UPDATE_BASE_URL/latest.json" \
            --version "$(node -p "require('./package.json').version")"

      # Delete intermediate artifacts after a successful publish. If the publish
      # fails, artifacts remain available for reruns.
      - name: Delete intermediate artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          node -e '
            const h = { Authorization: `Bearer ${process.env.GH_TOKEN}`, Accept: "application/vnd.github+json" };
            const base = `https://api.github.com/repos/${process.env.REPO}`;
            (async () => {
              const r = await fetch(`${base}/actions/runs/${process.env.RUN_ID}/artifacts`, { headers: h });
              const j = await r.json();
              for (const a of j.artifacts || []) {
                await fetch(`${base}/actions/artifacts/${a.id}`, { method: "DELETE", headers: h });
                console.log("deleted:", a.name);
              }
            })().catch((e) => { console.log("artifact cleanup skipped:", e.message); });
          '
